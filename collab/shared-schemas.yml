version: 2
description: Shared data schemas for Blue Agent × Aeon × MiroShark collaboration

changelog:
  v2:
    date: 2026-05-18
    changes:
      - rewrite based on actual Aeon and MiroShark capabilities
      - Aeon uses A2A/MCP output, not HTTP POST signal
      - MiroShark uses webhook callbacks, not synchronous POST
      - removed fixed agent count and horizon from scenario
      - added webhook_result schema for MiroShark → Blue Agent async flow
  v1:
    date: 2026-05-17
    changes:
      - initial release — signal, scenario, forecast, action, result schemas

# ── Aeon Output (Aeon → Blue Agent via A2A or webhook) ───────────────────────
# Aeon runs on GitHub Actions cron. It does NOT POST signals in real-time.
# Integration: Aeon skill output → Blue Agent via A2A gateway or webhook notify.
aeon_output:
  description: >
    Output from an Aeon skill run. Delivered via A2A protocol gateway,
    webhook notify, or Telegram. Blue Agent reads and decides whether to act.
  required:
    - id
    - skill
    - output
    - quality_score
    - timestamp
  properties:
    id:
      type: string
      example: "aeon_run_20260518_001"
    skill:
      type: string
      description: Which Aeon skill produced this output
      enum:
        - github-monitor      # repo change digest
        - token-movers        # price / volume movement
        - defi-monitor        # onchain DeFi activity
        - digest              # general research digest
        - code-health         # codebase quality report
        - blue_audit          # invoked blue_audit via MCP
        - custom              # any other Aeon skill
    output:
      type: string
      description: Raw text output from the Aeon skill run
    quality_score:
      type: integer
      minimum: 1
      maximum: 5
      description: Aeon auto-scores its own output (1=failed, 5=excellent)
    flags:
      type: array
      items:
        type: string
        enum: [api_error, stale_data, rate_limited, actionable, informational]
    source_repo:
      type: string
      description: Repo being monitored, if applicable
      example: "madebyshun/blue-agent"
    timestamp:
      type: string
      format: iso8601
    notify_channel:
      type: string
      enum: [telegram, discord, slack, webhook]
      description: How this output was delivered to Blue Agent

# ── Scenario (Blue Agent → MiroShark REST API) ───────────────────────────────
# MiroShark exposes REST at /api/simulation/
# Blue Agent POSTs a scenario, MiroShark runs simulation, returns via webhook
scenario:
  description: >
    Scenario payload Blue Agent sends to MiroShark /api/simulation/ endpoint.
    MiroShark generates Bull/Bear/Neutral variants automatically.
  required:
    - id
    - scenario
    - webhook_url
  properties:
    id:
      type: string
      example: "scn_20260518_001"
    scenario:
      type: string
      description: Plain-text scenario for MiroShark to simulate
      example: "Blue Agent distributes 500 USDC to top holders after a volume spike — how does the community react?"
    context:
      type: object
      description: Optional context to ground the simulation
      properties:
        token:
          type: string
          example: "BLUEAGENT"
        platform:
          type: string
          enum: [twitter, reddit, prediction_markets]
          description: Which platform to simulate reactions on
        recent_activity:
          type: string
    webhook_url:
      type: string
      description: Blue Agent endpoint to receive MiroShark results
      example: "https://blueagent.dev/api/webhook/miroshark"
    webhook_secret:
      type: string
      description: HMAC secret for webhook verification (optional)

# ── Webhook Result (MiroShark → Blue Agent async callback) ───────────────────
# MiroShark POSTs this to blueagent.dev/api/webhook/miroshark when done
webhook_result:
  description: >
    MiroShark simulation result delivered via webhook POST.
    Blue Agent receives this and decides: execute / alert / skip.
  required:
    - simulation_id
    - consensus_split
    - recommendation
    - transcript_url
  properties:
    simulation_id:
      type: string
    scenario_id:
      type: string
      description: Matches the scenario.id Blue Agent submitted
    consensus_split:
      type: object
      description: Bull/Bear/Neutral percentage breakdown
      properties:
        bull:
          type: number
        bear:
          type: number
        neutral:
          type: number
    recommendation:
      type: string
      enum: [execute, alert_human, skip]
      description: Blue Agent maps consensus_split to this decision
    quality_metrics:
      type: object
      description: Simulation quality metadata from MiroShark
    transcript_url:
      type: string
      description: Full transcript at /api/simulation/{id}/transcript
    trajectory_url:
      type: string
      description: Time-series belief data at /api/simulation/{id}/trajectory.csv
    timestamp:
      type: string
      format: iso8601

# ── Decision (Blue Agent internal) ───────────────────────────────────────────
# How Blue Agent maps MiroShark consensus to action
decision:
  thresholds:
    execute:
      condition: "bull consensus > 60%"
      action: "Blue Agent executes onchain automatically"
    alert_human:
      condition: "bull 40–60% OR bear > 40%"
      action: "Telegram alert to blueagent_hub, await human input"
    skip:
      condition: "neutral > 60% OR quality_score < 3"
      action: "Log and discard — not enough signal"

# ── Action (Blue Agent → onchain / community) ────────────────────────────────
action:
  required:
    - id
    - type
    - trigger_source
    - status
  properties:
    id:
      type: string
    type:
      type: string
      enum:
        - distribute_usdc
        - distribute_token
        - post_telegram
        - post_farcaster
        - run_blue_audit
        - trigger_command
    trigger_source:
      type: string
      description: What triggered this action
      enum: [aeon_output, miroshark_webhook, manual]
    aeon_run_id:
      type: string
    simulation_id:
      type: string
    payload:
      type: object
    status:
      type: string
      enum: [pending, executing, done, failed]
    tx_hash:
      type: string
    executed_at:
      type: string
      format: iso8601

# ── Result (Blue Agent → feedback) ───────────────────────────────────────────
result:
  required:
    - action_id
    - predicted
    - actual
  properties:
    action_id:
      type: string
    predicted:
      type: string
      description: What MiroShark forecast (from consensus_split)
    actual:
      type: string
      description: What actually happened post-action
    delta_pct:
      type: number
    lesson:
      type: string
      description: One-line takeaway to improve future simulations
    timestamp:
      type: string
      format: iso8601
