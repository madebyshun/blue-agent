name: RH RWA — Semantic Smoke

on:
  pull_request:
    paths:
      - "apps/web/src/app/api/x402/_handlers/rh-*.ts"
      - "apps/web/src/lib/robinhood/**"
      - "apps/web/src/lib/agent-tools.ts"
      - "apps/web/scripts/semantic-smoke.ts"
      - ".github/workflows/rh-rwa-semantic-smoke.yml"
  schedule:
    - cron: "0 */6 * * *"   # every 6h against prod
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tsx
        run: npm i -g tsx@latest

      - name: Run semantic smoke against prod
        env:
          TARGET: https://blueagent.dev
          INTERNAL_SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
        working-directory: apps/web
        run: tsx scripts/semantic-smoke.ts
