name: Blue Feed — hourly data push

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  push-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger BlueAgent Feed
        run: |
          curl -X POST https://blueagent.dev/api/cron/feed \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30
