[profile.default]
src        = "contracts"
out        = "contracts/out"
cache_path = "contracts/cache"
libs       = []
solc       = "0.8.20"
# via_ir + optimizer needed for RobinhoodSwapRouter.sol (many locals across
# its swap entrypoints hit "stack too deep" without it). Harmless for the
# simpler contracts in this repo (RobinhoodToken, BlueMarketStaking).
via_ir     = true
optimizer  = true
optimizer_runs = 200

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
