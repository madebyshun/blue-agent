[profile.default]
src        = "contracts"
out        = "contracts/out"
cache_path = "contracts/cache"
libs       = ["lib"]
# Solc 0.8.26 required by v4-core / v4-periphery (Cancun EVM version).
# All our own contracts declare ^0.8.20, so they compile fine against 0.8.26.
solc       = "0.8.26"
evm_version = "cancun"
# via_ir + optimizer needed for RobinhoodSwapRouter.sol (many locals across
# its swap entrypoints hit "stack too deep" without it). Harmless for the
# simpler contracts in this repo (RobinhoodToken, BlueMarketStaking).
# Also required by v4-core, which sets optimizer_runs = 44444444 upstream;
# we use a more modest 200 since our own contracts don't need extreme opt.
via_ir     = true
optimizer  = true
optimizer_runs = 200

# Remappings for Uniswap V4 imports. Same aliases the V4 repos themselves
# use (see foundry.toml in lib/v4-core), so upstream imports resolve cleanly.
remappings = [
    "@uniswap/v4-core/=lib/v4-core/",
    "@uniswap/v4-periphery/=lib/v4-periphery/",
    "v4-core/=lib/v4-core/src/",
    "v4-periphery/=lib/v4-periphery/src/",
    "permit2/=lib/v4-periphery/lib/permit2/",
    "solmate/=lib/v4-core/lib/solmate/src/",
    "forge-std/=lib/v4-core/lib/forge-std/src/",
    "@openzeppelin/=lib/v4-core/lib/openzeppelin-contracts/",
]

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
